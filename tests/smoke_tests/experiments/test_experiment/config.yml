data:
  corpus_pairs:
  - src: en-BSB
    trg: es-LBLA
    test_size: 16
  lang_codes:
    en: eng_Latn
    es: spa_Latn
  tokenizer:
    trained_tokens: false
    update_src: false
    update_trg: false
eval:
  per_device_eval_batch_size: 8
infer:
  infer_batch_size: 8
model: facebook/nllb-200-distilled-1.3B
train:
  gradient_accumulation_steps: 8
  per_device_train_batch_size: 8
  max_steps: 8
  gradient_checkpointing: false
params:
  label_smoothing_factor: 0.0
